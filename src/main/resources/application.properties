# Desktop application: no embedded web server is started.
spring.main.web-application-type=none

# Swing needs a real (non-headless) AWT environment; Spring Boot defaults to headless.
spring.main.headless=false

# Keep the console clean for the desktop app.
spring.main.banner-mode=off

# --- Persistence (Spring Data JPA + HikariCP) ---
# Credentials come from the environment; the defaults only ease local demo runs and are hardened
# (moved fully out of the repo) in Iteration 6. The Railway deployment overrides these through the
# "railway" profile (application-railway.properties) with values injected as environment variables.
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/sushiburrito_db?openTelemetry=DISABLED}
spring.datasource.username=${DB_USERNAME:sushiBurrito}
spring.datasource.password=${DB_PASSWORD:SBDataBaseKey2025}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# The schema is owned by Flyway (never by Hibernate): versioned, immutable migrations under
# src/main/resources/db/migration recreate the English 3NF schema from scratch on first startup.
spring.jpa.hibernate.ddl-auto=none
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
# Declaring the dialect explicitly avoids the startup connection Hibernate would otherwise open just
# to detect it; the entity column names now map 1:1 to the migrated schema (no @Column overrides).
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false
