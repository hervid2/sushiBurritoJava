# Desktop application: no embedded web server is started.
spring.main.web-application-type=none

# Swing needs a real (non-headless) AWT environment; Spring Boot defaults to headless.
spring.main.headless=false

# Keep the console clean for the desktop app.
spring.main.banner-mode=off

# --- Persistence (Spring Data JPA + HikariCP) ---
# Credentials come from the environment; the defaults only ease local demo runs and are hardened
# (moved fully out of the repo) in Iteration 6.
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/sushiburrito_db?openTelemetry=DISABLED}
spring.datasource.username=${DB_USERNAME:sushiBurrito}
spring.datasource.password=${DB_PASSWORD:SBDataBaseKey2025}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# The schema is owned by the database (Flyway takes over in Iteration 5), never by Hibernate.
spring.jpa.hibernate.ddl-auto=none
# Declaring the dialect explicitly avoids the startup connection Hibernate would otherwise open just
# to detect it, so the Login window still shows when the database is unreachable.
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false
# Do not abort startup if the pool cannot reach the database up front.
spring.datasource.hikari.initialization-fail-timeout=-1
