# Desktop application: no embedded web server is started.
spring.main.web-application-type=none

# Swing needs a real (non-headless) AWT environment; Spring Boot defaults to headless.
spring.main.headless=false

# Keep the console clean for the desktop app.
spring.main.banner-mode=off

# Optional, gitignored file for local credentials (see application-local.properties.example).
# Dropping it next to the jar / project root keeps secrets out of both the repo and the shell history;
# "optional:" means the app still starts when it is absent and the variables come from the environment.
spring.config.import=optional:file:./application-local.properties

# --- Persistence (Spring Data JPA + HikariCP) ---
# No credential is hardcoded here: the URL keeps a local-database default (a host name is not a
# secret), while username and password have NO fallback, so the app can never silently connect with a
# baked-in account -- they must come from the environment or from application-local.properties. The
# Railway deployment overrides the URL through the "railway" profile (application-railway.properties).
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/sushiburrito_db?openTelemetry=DISABLED}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# The schema is owned by Flyway (never by Hibernate): versioned, immutable migrations under
# src/main/resources/db/migration recreate the English 3NF schema from scratch on first startup.
spring.jpa.hibernate.ddl-auto=none
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
# Declaring the dialect explicitly avoids the startup connection Hibernate would otherwise open just
# to detect it; the entity column names now map 1:1 to the migrated schema (no @Column overrides).
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false
