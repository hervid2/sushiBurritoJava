# --- Railway profile ---
# Activate with SPRING_PROFILES_ACTIVE=railway. Every value is injected as an environment variable;
# no secret is ever committed to the repository. Unlike the common profile there is no localhost
# fallback here, so a missing variable fails fast instead of silently targeting a local database.
#
# Expected environment variables (set them in the local terminal, the IDE run configuration or a
# gitignored application-local.properties before running against Railway):
#   DB_URL      jdbc:mysql://<host>:<port>/sushiburrito_db   (e.g. nozomi.proxy.rlwy.net:59005)
#   DB_USERNAME database user
#   DB_PASSWORD database password (rotate any password that was ever exposed before using it)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
