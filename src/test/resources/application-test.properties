# Test profile: run the smoke and service tests against an in-memory H2 database so no MySQL server
# is required. The production schema is owned by Flyway (MySQL DDL); here it is disabled and Hibernate
# generates an equivalent schema from the entities for the duration of the test.
spring.datasource.url=jdbc:h2:mem:sushiburrito_test;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.flyway.enabled=false
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.open-in-view=false
